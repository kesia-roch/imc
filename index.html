<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC</title>
    <!-- favicon-->
     <link rel="icon" type="image/png" href="images/favicon.png">
 
    <!-- css-->
     <link rel="stylesheet" href="css/estilo.css">
 
</head>
 
<body>
    <div class="formulario">
        <h2>Dados do Paciente</h2>
        <form id="formIMC" onsubmit="processaCalculo(event)">
 
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex: Maria
Silva" minLength="2" maxLength="100" required
                title="Informe o nome completo">
 
                <label for="nascimento">Data de Nascimento</label>
                <input type="date" id="nascimento">
 
                <label for="peso">Peso (kg)</label>
                <input type="number" id="peso" step="0.1" min="0"
                max="350" placeholder="Ex: 68.4" required>
 
                <label for="altura">Altura(m)</label>
                <input type="number" id="altura" step="0.01"
                placeholder="Ex: 1.71" min="0" max="2.50" required>
 
                <button type="submit">Calcular</button>
                <button type="reset" class="clear"> Limpar</button>
 
        </form>
 
    </div>
    <div id="resultado"></div>
 
<!-- JS-->
    <script src="js/script.js"></script>
 
</body>
</html>
